<!DOCTYPE html>
<html>
<head>
<title>Advanced JavaScript ES6 Features</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#11998e,#38ef7d);
margin:0;
padding:40px;
}

h1{
text-align:center;
color:white;
margin-bottom:30px;
}

.container{
width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

button{
display:block;
margin:0 auto 20px auto;
padding:10px 25px;
border:none;
border-radius:20px;
background:#ff4081;
color:white;
font-size:16px;
cursor:pointer;
}

.section{
background:#f5f5f5;
margin-bottom:15px;
padding:15px;
border-left:5px solid #ff4081;
border-radius:5px;
}

.label{
font-weight:bold;
}

.value{
color:#333;
}

</style>

</head>

<body>

<h1>Advanced JavaScript ES6 Features</h1>

<div class="container">

<button onclick="showData()">Run Demo</button>

<div class="section">
<div class="label">Destructuring</div>
ID: <span id="sid" class="value"></span><br>
Name: <span id="sname" class="value"></span><br>
Course: <span id="scourse" class="value"></span>
</div>

<div class="section">
<div class="label">Template Literals</div>
<span id="templateText" class="value"></span>
</div>

<div class="section">
<div class="label">Arrow Function</div>
Total Marks: <span id="marks" class="value"></span>
</div>

<div class="section">
<div class="label">Promise + Async/Await</div>
<span id="status" class="value"></span>
</div>

</div>

<script>

// Arrow Function
const add = (a,b) => a + b;


// Object
const student = {
id:101,
name:"Ananthi",
course:"AI & ML",
year:"2nd Year"
};


// Promise
function getStudent(){
return new Promise(function(resolve){
setTimeout(function(){
resolve(student);
},1000);
});
}


// Async / Await
async function showData(){

var data = await getStudent();

// Destructuring
var id = data.id;
var name = data.name;
var course = data.course;

// Arrow Function usage
var total = add(60,40);

// Display values
document.getElementById("sid").textContent = id;
document.getElementById("sname").textContent = name;
document.getElementById("scourse").textContent = course;

document.getElementById("templateText").textContent =
`Student ${name} is studying ${course}`;

document.getElementById("marks").textContent = total;

document.getElementById("status").textContent =
"Student data loaded successfully";

}

</script>

</body>
</html>
