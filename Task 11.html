<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Elegant UI JS Project</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
}

.app {
    width: 500px;
    max-width: 92%;
    padding: 35px;
    border-radius: 20px;

    background: #ffffff;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);

    text-align: center;
}

h2 {
    font-size: 17px;
    margin: 18px 0 8px;
    color: #444;
}

button {
    padding: 10px 16px;
    margin: 6px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg,#ff9a9e,#fecfef);
    color: #333;
    cursor: pointer;
    font-weight: 500;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

input {
    width: 85%;
    padding: 10px;
    margin: 8px;
    border-radius: 10px;
    border: 1px solid #ddd;
    outline: none;
}

input:focus {
    border-color: #ff9a9e;
}

.output {
    font-size: 14px;
    margin-top: 5px;
    color: #666;
}

.slider img {
    width: 100%;
    border-radius: 12px;
    margin-top: 10px;
}

.counter {
    font-size: 28px;
    margin: 10px;
    font-weight: bold;
    color: #333;
}

.section {
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid #eee;
}

</style>
</head>
<body>

<div class="app">

<div class="section">
<h2>Background Changer</h2>
<button onclick="changeColor()">Change Background</button>
</div>

<div class="section">
<h2>Live Text Preview</h2>
<input type="text" placeholder="Type here..." onkeyup="showText(this.value)">
<div class="output" id="output"></div>
</div>

<div class="section">
<h2>Password Toggle</h2>
<input type="password" id="pwd" placeholder="Enter password">
<br>
<button onclick="togglePassword()">Show / Hide</button>
</div>

<div class="section">
<h2>Image Slider</h2>
<div class="slider">
<img id="slider" src="https://picsum.photos/400/250?1">
</div>
<button onclick="prevImage()">Prev</button>
<button onclick="nextImage()">Next</button>
</div>

<div>
<h2>Counter</h2>
<div class="counter" id="count">0</div>
<button onclick="decrement()">-</button>
<button onclick="increment()">+</button>
</div>

</div>

<script>
function changeColor() {
    const gradients = [
        "linear-gradient(135deg, #fbc2eb, #a6c1ee)",
        "linear-gradient(135deg, #ff9a9e, #fad0c4)",
        "linear-gradient(135deg, #fddb92, #d1fdff)",
        "linear-gradient(135deg, #a18cd1, #fbc2eb)",
        "linear-gradient(135deg, #ffecd2, #fcb69f)"
    ];
    let random = Math.floor(Math.random() * gradients.length);
    document.body.style.background = gradients[random];
}

function showText(val) {
    document.getElementById("output").innerText = val;
}

function togglePassword() {
    let p = document.getElementById("pwd");
    p.type = (p.type === "password") ? "text" : "password";
}

let images = [
    "https://picsum.photos/400/250?1",
    "https://picsum.photos/400/250?2",
    "https://picsum.photos/400/250?3"
];

let index = 0;

function showImage() {
    document.getElementById("slider").src = images[index];
}

function nextImage() {
    index = (index + 1) % images.length;
    showImage();
}

function prevImage() {
    index = (index - 1 + images.length) % images.length;
    showImage();
}

let count = 0;

function increment() {
    count++;
    document.getElementById("count").innerText = count;
}

function decrement() {
    count--;
    document.getElementById("count").innerText = count;
}
</script>

</body>
</html>
