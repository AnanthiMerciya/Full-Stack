<!DOCTYPE html>
<html>
<head>
<title>Task 11</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Poppins', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
}

.app {
    width: 500px;
    max-width: 92%;
    padding: 35px;
    border-radius: 20px;
    background: #fff;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    text-align: center;
}

h2 {
    font-size: 17px;
    margin: 18px 0 8px;
    color: #444;
}

button {
    padding: 10px 16px;
    margin: 6px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg,#ff9a9e,#fecfef);
    color: #333;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

input {
    width: 85%;
    padding: 10px;
    margin: 8px;
    border-radius: 10px;
    border: 1px solid #ddd;
}

.output {
    margin-top: 5px;
    color: #666;
}

img {
    width: 100%;
    border-radius: 12px;
    margin-top: 10px;
}

.counter {
    font-size: 28px;
    margin: 10px;
}
</style>
</head>

<body>

<div id="root"></div>

<script type="text/babel">

function App() {

    const [text, setText] = React.useState("");
    const [showPwd, setShowPwd] = React.useState(false);
    const [count, setCount] = React.useState(0);
    const [index, setIndex] = React.useState(0);

    const images = [
        "https://picsum.photos/400/250?1",
        "https://picsum.photos/400/250?2",
        "https://picsum.photos/400/250?3"
    ];

    const changeBackground = () => {
        const gradients = [
            "linear-gradient(135deg, #fbc2eb, #a6c1ee)",
            "linear-gradient(135deg, #ff9a9e, #fad0c4)",
            "linear-gradient(135deg, #fddb92, #d1fdff)",
            "linear-gradient(135deg, #a18cd1, #fbc2eb)"
        ];
        const random = Math.floor(Math.random() * gradients.length);
        document.body.style.background = gradients[random];
    };

    return (
        <div className="app">

            <h2>Background Changer</h2>
            <button onClick={changeBackground}>Change Background</button>

            <h2>Live Text Preview</h2>
            <input 
                type="text" 
                placeholder="Type here..."
                onChange={(e) => setText(e.target.value)}
            />
            <div className="output">{text}</div>

            <h2>Password Toggle</h2>
            <input 
                type={showPwd ? "text" : "password"} 
                placeholder="Enter password"
            />
            <br />
            <button onClick={() => setShowPwd(!showPwd)}>
                Show / Hide
            </button>

            <h2>Image Slider</h2>
            <img src={images[index]} />
            <br />
            <button onClick={() => setIndex((index - 1 + images.length) % images.length)}>Prev</button>
            <button onClick={() => setIndex((index + 1) % images.length)}>Next</button>

            <h2>Counter</h2>
            <div className="counter">{count}</div>
            <button onClick={() => setCount(count - 1)}>-</button>
            <button onClick={() => setCount(count + 1)}>+</button>

        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

</body>
</html>
