<!DOCTYPE html>
<html>
<head>
<title>Coffee Login</title>

<style>
*{
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#2b2b2b;
}

/* Main card */
.container{
    width:950px;
    height:520px;
    display:flex;
    border-radius:20px;
    overflow:hidden;
    background:#111;
    box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

/* LEFT IMAGE SIDE */
.left{
    width:50%;
    background:#f4efe8;
    display:flex;
    justify-content:center;
    align-items:center;
}

.left img{
    width:85%;
}

/* RIGHT LOGIN SIDE */
.right{
    width:50%;
    background:#1c1c1c;
    color:white;
    padding:50px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.right h2{
    margin-bottom:5px;
}

.right p{
    color:#aaa;
    font-size:14px;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:none;
    border-radius:6px;
    background:#2c2c2c;
    color:white;
}

input::placeholder{
    color:#999;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:13px;
    margin-bottom:20px;
}

.remember{
    display:flex;
    align-items:center;
    gap:6px;
}

.options a{
    color:#ccc;
    text-decoration:none;
}

button{
    padding:12px;
    border:none;
    border-radius:25px;
    background:#f4efe8;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#e0d8cd;
}

.or{
    text-align:center;
    margin:15px 0;
    font-size:13px;
    color:#aaa;
}

.google{
    text-align:center;
}

.google a{
    color:white;
    text-decoration:none;
}

.signup{
    margin-top:20px;
    font-size:13px;
    text-align:center;
}

.signup a{
    color:#f4efe8;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="container">

    <!-- LEFT IMAGE -->
    <div class="left">
        <img src="coffee.png" alt="Coffee Illustration">
    </div>
    <div class="right">
        <h2>Welcome Back</h2>
        <p>Please login to your account</p>

        <input type="email" placeholder="Email Address">
        <input type="password" placeholder="Password">
    
    <div class="options">
    <div class="remember">
        <input type="checkbox" id="remember">
        <label for="remember">Remember me</label>
    </div>

    <a href="#">Forgot password?</a>
</div>


        <button>Sign in</button>

        <div class="or">or</div>

        <div class="google">
            <a href="#">Sign in with Google</a>
        </div>

        <div class="signup">
            New CoffeeLover? <a href="#">Create Account</a>
        </div>
    </div>

</div>

</body>
</html>
